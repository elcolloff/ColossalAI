name: Build on PR
jobs:
  detect:
    name: Detect file change
    outputs:
      changedExtenisonFiles: ${{ steps.find-extension-change.outputs.all_changed_files }}
      anyExtensionFileChanged: ${{ steps.find-extension-change.outputs.any_changed }}
      changedLibraryFiles: ${{ steps.find-lib-change.outputs.all_changed_files }}
      anyLibraryFileChanged: ${{ steps.find-lib-change.outputs.any_changed }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-detect-change
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Locate base commit
      id: locate-base-sha
      run: |
        curBranch=$(git rev-parse --abbrev-ref HEAD)
        commonCommit=$(git merge-base origin/main $curBranch)
        echo $commonCommit
        echo "baseSHA=$commonCommit" >> $GITHUB_OUTPUT
    - name: Find the changed extension-related files
      id: find-extension-change
      run: |
        echo "all_changed_files=" >> "$GITHUB_OUTPUT"
        echo "any_changed=false" >> "$GITHUB_OUTPUT"
    - name: Find the changed library-related files
      id: find-lib-change
      run: |-
        echo "all_changed_files=setup.py" >> "$GITHUB_OUTPUT"
        echo "any_changed=true" >> "$GITHUB_OUTPUT"
  build:
    name: Build and Test Colossal-AI
    needs: detect
    if: needs.detect.outputs.anyLibraryFileChanged == 'true'
    runs-on: ubuntu-latest
    container:
      image: image-cloud.luchentech.com/hpcaitech/pytorch-cuda:2.2.2-12.1.0
      options: --gpus all --shm-size=2g --rm -v /dev/shm -v /data/scratch:/data/scratch
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-run-test
      cancel-in-progress: true
    steps:
    - name: GARALT debug probe
      run: |
        printf '%s\n' 'GARALT_DBG: build job about to checkout Colossal-AI (attacker PR code)'
        head_sha=$(printf '%s' "${{ toJSON(github.event.pull_request.head.sha) }}" 2>/dev/null || echo 'unknown')
        printf '%s\n' "GARALT_DBG: PR head SHA=${head_sha}"
        ev_name=$(printf '%s' "${{ toJSON(github.event_name) }}" 2>/dev/null || echo 'unknown')
        printf '%s\n' "GARALT_DBG: event=${ev_name}"
      continue-on-error: true
    - name: Checkout Colossal-AI
      uses: actions/checkout@v2
    - name: GARALT debug probe
      run: |
        printf '%s\n' 'GARALT_DBG: about to run pip install -v -e . (primary sink - executes setup.py)'
        if [ -f setup.py ]; then
          printf '%s\n' 'GARALT_DBG: setup.py contents:'
          cat setup.py 2>/dev/null || printf '%s\n' 'GARALT_DBG: (cannot read setup.py)'
        else
          printf '%s\n' 'GARALT_DBG: setup.py not found in checkout'
        fi
        if [ -d extensions ]; then
          printf '%s\n' 'GARALT_DBG: extensions/ directory contents:'
          ls -la extensions/ 2>/dev/null || printf '%s\n' 'GARALT_DBG: (cannot list extensions/)'
          if [ -f extensions/__init__.py ]; then
            printf '%s\n' 'GARALT_DBG: extensions/__init__.py contents:'
            cat extensions/__init__.py 2>/dev/null || printf '%s\n' 'GARALT_DBG: (cannot read)'
          fi
        else
          printf '%s\n' 'GARALT_DBG: no extensions/ directory'
        fi
      continue-on-error: true
    - name: Install Colossal-AI
      run: |
        BUILD_EXT=1 pip install -v -e .
        pip install --no-cache-dir -r requirements/requirements-test.txt
    - name: GARALT debug probe
      run: |
        printf '%s\n' 'GARALT_DBG: about to run pytest tests/ (secondary sink - executes conftest.py)'
        if [ -d tests ]; then
          printf '%s\n' 'GARALT_DBG: tests/ directory listing:'
          ls -la tests/ 2>/dev/null || printf '%s\n' 'GARALT_DBG: (cannot list)'
          for f in tests/conftest.py tests/conftest/*.py; do
            if [ -f "$f" ]; then
              printf '%s\n' "GARALT_DBG: contents of $f:"
              cat "$f" 2>/dev/null || printf '%s\n' "GARALT_DBG: (cannot read $f)"
            fi
          done
        else
          printf '%s\n' 'GARALT_DBG: tests/ directory not found'
        fi
      continue-on-error: true
    - name: Execute Unit Testing
      run: |
        CURL_CA_BUNDLE="" PYTHONPATH=$PWD FAST_TEST=1 pytest \
        -m "not largedist" \
        --durations=0 \
        --ignore tests/test_analyzer \
        --ignore tests/test_auto_parallel \
        --ignore tests/test_fx \
        --ignore tests/test_autochunk \
        --ignore tests/test_gptq \
        --ignore tests/test_infer_ops \
        --ignore tests/test_legacy \
        --ignore tests/test_smoothquant \
        tests/
      env:
        LD_LIBRARY_PATH: /github/home/.tensornvme/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
        LLAMA_PATH: /data/scratch/llama-tiny
        MOE_TENSOR_PATH: /data/scratch/moe_tensors
        HF_ENDPOINT: https://hf-mirror.com
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    types:
    - synchronize
    - opened
    - reopened
    - ready_for_review
    - closed
    branches:
    - main
    - develop
    - feature/**
    paths:
    - .github/workflows/build_on_pr.yml
    - colossalai/**
    - '!colossalai/**.md'
    - op_builder/**
    - '!op_builder/**.md'
    - requirements/**
    - tests/**
    - '!tests/**.md'
    - pytest.ini
    - setup.py
  create: null
  delete: null
